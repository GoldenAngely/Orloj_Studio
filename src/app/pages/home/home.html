<section class="home-page">
    <div class="page-container">
  <div class="hero">
    <p class="eyebrow">Astronomy Engine</p>

    <h1>Explora el reloj astronómico.</h1>

    <p class="description">
      Una interfaz inspirada en relojes astronómicos, órbitas doradas,
      fases lunares y movimiento solar.
    </p>

    <mat-card class="feature-card" routerLink="/reloj-astronomico">
      <mat-card-header>
        <div mat-card-avatar class="card-icon">
          <mat-icon>public</mat-icon>
        </div>

        <mat-card-title>Reloj astronómico</mat-card-title>

        <mat-card-subtitle>
          Ver posición solar, luna, signos y ciclo día/noche
        </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p>
          Entra para visualizar el diseño base del reloj.
        </p>
      </mat-card-content>

      <mat-card-actions>
        <button matButton="filled" type="button">
          Abrir vista
          <mat-icon>arrow_forward</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
    </div>
</section>
