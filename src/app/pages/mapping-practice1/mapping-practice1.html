<section class="catalog-page">
  <br>

  <h1>Mapeos</h1>

  <mat-tab-group class="catalog-tabs" animationDuration="250ms">
    @for (catalog of catalogs(); track catalog.title) {
      <mat-tab>
        <ng-template mat-tab-label>
          <mat-icon class="tab-icon">{{ getCatalogIcon(catalog.title) }}</mat-icon>
          {{ catalog.title }}
        </ng-template>

        <article class="catalog-card">
          @if (catalog.loading) {
            <p>Cargando...</p>
          } @else if (catalog.error) {
            <p class="error-message">{{ catalog.error }}</p>
          } @else if (catalog.rows.length === 0) {
            <p class="empty-message">Sin datos disponibles.</p>
          } @else {
            <app-catalog-material-table
              [columns]="catalog.columns"
              [rows]="catalog.rows">
            </app-catalog-material-table>
          }
        </article>
      </mat-tab>
    }
  </mat-tab-group>
</section>
